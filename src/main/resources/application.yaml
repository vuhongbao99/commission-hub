spring:
  datasource:
    url: jdbc:mysql://localhost:3306/commission_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: root
    password: 12345

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false

jwt:
  secret: CommissionHub2025SecretKeyMustBe32CharsMinimum!
  expiration: 86400000
  refresh-expiration: 604800000

server:
  port: 8080

logging:
  level:
    com.commissionhub: INFO
    org.springframework.security: WARN